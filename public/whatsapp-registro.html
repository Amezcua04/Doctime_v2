<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WhatsApp Coexistence Signup</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 h-screen flex items-center justify-center">
    
    <div class="bg-white p-8 rounded-lg shadow-md max-w-md w-full text-center">
        <h2 class="text-2xl font-bold mb-4 text-gray-800">Conectar WhatsApp</h2>
        <p class="text-gray-600 mb-6 text-sm">Durante el proceso, cuando el asistente te pregunte, asegúrate de seleccionar la opción <strong>"Mantener la aplicación móvil"</strong> (Coexistencia).</p>
        
        <button onclick="launchWhatsAppSignup()" class="w-full bg-[#1877F2] hover:bg-[#166FE5] text-white font-bold py-3 px-4 rounded transition duration-200">
            Conectar Número con Meta
        </button>

        <div id="status" class="mt-6 text-sm font-medium text-gray-500 hidden">
            Esperando respuesta... Abre la consola (F12) para ver detalles.
        </div>
    </div>

    <script>
      // 1. Inicializar el SDK de Meta
      window.fbAsyncInit = function() {
        FB.init({
          appId            : '1710740677018215',
          autoLogAppEvents : true,
          xfbml            : true,
          version          : 'v25.0'
        });
      };

      // 2. Función que lanza la ventana emergente de Meta
      function launchWhatsAppSignup() {
        const statusDiv = document.getElementById('status');
        statusDiv.classList.remove('hidden');
        statusDiv.innerText = "Ventana emergente abierta... Completa el registro ahí.";
        statusDiv.className = "mt-6 text-sm font-medium text-blue-600";

        // SUSTITUYE ESTO POR EL NÚMERO QUE CREASTE EN EL PASO 1
        const miConfigId = 'TU_NUEVO_CONFIG_ID'; 

        FB.login(function(response) {
          if (response.authResponse) {
            const code = response.authResponse.code;
            console.log('¡Éxito! Código obtenido:', code);
            
            statusDiv.innerText = "¡Proceso terminado con éxito! Tu número ya está vinculado. Puedes cerrar esta ventana.";
            statusDiv.className = "mt-6 text-sm font-medium text-green-600";
          } else {
            console.log('El usuario canceló el inicio de sesión o cerró la ventana antes de terminar.');
            statusDiv.innerText = "El registro fue cancelado.";
            statusDiv.className = "mt-6 text-sm font-medium text-red-600";
          }
        }, {
          config_id: miConfigId,
          response_type: 'code',
          override_default_response_type: true,
          extras: {
            setup: {},
            featureType: '',
            sessionInfoVersion: '2'
          }
        });
      }
    </script>
    <script async defer crossorigin="anonymous" src="https://connect.facebook.net/es_LA/sdk.js"></script>
</body>
</html>
