<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WhatsApp Coexistence Signup</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 h-screen flex items-center justify-center">
    
    <div class="bg-white p-8 rounded-lg shadow-md max-w-md w-full text-center">
        <h2 class="text-2xl font-bold mb-4 text-gray-800">Conectar WhatsApp</h2>
        <p class="text-gray-600 mb-6 text-sm">Haz clic en el botón oficial de Meta abajo. Recuerda seleccionar la opción de <strong>Coexistencia</strong> cuando detecte tu número móvil.</p>
        
        <div class="flex justify-center my-4">
            <fb:login-button 
                config_id="2214655339300500" 
                onlogin="checkLoginState();"
                scope="whatsapp_business_management,whatsapp_business_messaging"
                size="large"
                button-type="continue_with"
                auth_type="reauthorize">
            </fb:login-button>
        </div>

        <div id="status" class="mt-6 text-sm font-medium text-gray-500">
            Esperando interacción... Abre la consola (F12) para validar las respuestas.
        </div>
    </div>

    <script>
      // 1. Inicializar el SDK de Meta habilitando XFBML
      window.fbAsyncInit = function() {
        FB.init({
          appId            : '1710740677018215',
          cookie           : true, // Habilita las cookies para que el servidor pueda acceder a la sesión
          xfbml            : true, // ¡CRÍTICO! Permite que Meta renderice el botón nativo
          version          : 'v25.0'
        });
        
        // Fuerza el renderizado de los componentes nativos de Meta
        FB.XFBML.parse();
      };

      // 2. Función Callback que se ejecuta automáticamente al terminar el flujo del botón
      function checkLoginState() {
        const statusDiv = document.getElementById('status');
        statusDiv.innerText = "Procesando respuesta de Meta...";
        statusDiv.className = "mt-6 text-sm font-medium text-blue-600";

        FB.getLoginStatus(function(response) {
          if (response.status === 'connected') {
            console.log('¡Inicio de sesión exitoso con botón oficial!');
            console.log('Respuesta completa de autenticación:', response.authResponse);
            
            // Extraemos el código devuelto para el Embedded Signup
            const code = response.authResponse.code;
            console.log('Código obtenido (code):', code);
            
            statusDiv.innerText = "¡Vínculo completado! Tu número ha sido asociado. Puedes revisar el panel de Meta.";
            statusDiv.className = "mt-6 text-sm font-medium text-green-600";
          } else {
            console.log('El usuario no completó el flujo o se canceló:', response);
            statusDiv.innerText = "El registro no se completó con éxito.";
            statusDiv.className = "mt-6 text-sm font-medium text-red-600";
          }
        });
      }
    </script>
    <script async defer crossorigin="anonymous" src="https://connect.facebook.net/es_LA/sdk.js"></script>
</body>
</html>
